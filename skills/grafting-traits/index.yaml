slug: grafting-traits
name: Grafting Traits

description: |
  Use this skill IF a post-mint customization (trait swap, metadata update,
  image replacement) needs to land on a live token. Customization cluster's
  act-skill — orchestrates updating-metadata + updating-image + re-pin.
version: 0.1.0

triggers:
  - "graft this trait"
  - "swap the trait"
  - "post-mint customization"
  - "evolve the token"
  - "/tend graft"

capabilities:
  model_tier: sonnet
  danger_level: caution
  effort_hint: medium
  downgrade_allowed: false
  execution_hint: sequential
  requires:
    native_runtime: false
    tool_calling: true
    thinking_traces: false
    vision: false
