slug: serving-metadata
name: Serving Metadata

description: |
  Use this skill IF a new collection needs to join the canonical 0xHoneyJar
  metadata-serving substrate (Postgres row + Next.js dynamic route + CloudFront
  CDN), or a migration from fragile storage (IPFS, Irys, ad-hoc S3) into the
  canonical pattern. Documents and provisions the substrate.
version: 0.1.0

triggers:
  - "serve metadata"
  - "provision metadata route"
  - "onboard collection"
  - "set up metadata table"
  - "/tend serve"

capabilities:
  model_tier: sonnet
  danger_level: safe
  effort_hint: medium
  downgrade_allowed: true
  execution_hint: sequential
  requires:
    native_runtime: false
    tool_calling: true
    thinking_traces: false
    vision: false
