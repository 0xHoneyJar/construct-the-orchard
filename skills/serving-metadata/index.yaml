slug: serving-metadata
name: Serving Metadata

description: |
  Use this skill IF you need to AUDIT or DOCUMENT a collection's substrate
  against the canonical Postgres-route-CDN pattern, or onboard a new collection
  to that pattern. The architectural reference; staging-recovery is the act
  that targets it.
version: 0.1.0

triggers:
  - "audit the substrate"
  - "is this collection canonical"
  - "/tend serve"
  - "verify serving layers"
  - "onboard collection to canonical pattern"

capabilities:
  model_tier: sonnet
  danger_level: safe
  effort_hint: small
  downgrade_allowed: true
  execution_hint: sequential
  requires:
    native_runtime: false
    tool_calling: true
    thinking_traces: false
    vision: false
