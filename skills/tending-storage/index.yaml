slug: tending-storage
name: Tending Storage

description: |
  Use this skill IF user invokes `/tend storage` OR needs to verify dual-pin
  health across a collection (Freeside primary + IPFS fallback). The orchard's
  primary skill — substrate maintenance for everything else.
